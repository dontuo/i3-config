#font_family      jetbrains mono nerd font
font_family      Terminess Nerd font
#bold_font        auto
#italic_font      auto
#bold_italic_font auto

#adjust_column_width -8
#adjust_column_width -1
#adjust_line_height +2
font_size        16
mouse_hide_wait  2.0
cursor_shape     block
url_color        #0087bd
